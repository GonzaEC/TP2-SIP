# Imagen oficial CNCF, no la de "fluent-bit-eck"
image:
  repository: fluent/fluent-bit
  tag: 3.2.4

resources:
  requests: { cpu: 50m,  memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }

# Tolera taints del control plane (k3s single-node)
tolerations:
  - effect: NoSchedule
    operator: Exists

# RBAC para leer pod metadata via API
serviceAccount:
  create: true
rbac:
  create: true

# Necesita acceder al secret de ES para autenticarse
extraVolumes:
  - name: es-certs
    secret:
      secretName: scraper-es-http-certs-public
  - name: lua-scripts
    configMap:
      name: fluent-bit-lua-scripts
extraVolumeMounts:
  - name: es-certs
    mountPath: /etc/fluent-bit/certs
    readOnly: true
  - name: lua-scripts
    mountPath: /fluent-bit/etc/conf
    readOnly: true

env:
  - name: ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scraper-es-elastic-user
        key: elastic

config:
  service: |
    [SERVICE]
        Daemon         Off
        Flush          5
        Log_Level      info
        Parsers_File   /fluent-bit/etc/parsers.conf
        Parsers_File   /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*ml-scraper*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # Sólo nos quedamos con pods cuyo label app=scraper
    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['labels']['app'] ^scraper$

    # Parsea el JSON-line emitido por el scraper (si el log es JSON)
    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     log
        Parser       json_scraper
        Reserve_Data On
        Preserve_Key Off

    # Si no es JSON, parsea el texto plano con regex para extraer level, logger, message
    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     message
        Parser       scraper_regex
        Reserve_Data On
        Preserve_Key On

    # Extrae el nombre del producto desde el mensaje
    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/etc/conf/product_extractor.lua
        call    extract_product

    # Detecta eventos especiales y agrega campo event
    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/etc/conf/product_extractor.lua
        call    extract_event

  outputs: |
    [OUTPUT]
        Name              es
        Match             kube.*
        Host              scraper-es-http.elastic.svc.cluster.local
        Port              9200
        HTTP_User         elastic
        HTTP_Passwd       ${ES_PASSWORD}
        tls               On
        tls.verify        Off
        Suppress_Type_Name On
        Logstash_Format   On
        Logstash_Prefix   scraper-logs
        Logstash_DateFormat %Y.%m.%d
        Time_Key          @timestamp
        Replace_Dots      On
        Retry_Limit       5

  customParsers: |
    # Nota: el parser 'cri' ya viene built-in en Fluent Bit 3.x (parsers.conf).
    # Redefinirlo aquí causaba "already exists, skip" y Fluent Bit dejaba de
    # procesar el resto del archivo, dejando json_scraper sin cargar.
    [PARSER]
        Name         json_scraper
        Format       json
        Time_Key     timestamp
        Time_Format  %Y-%m-%dT%H:%M:%S%z
        Time_Keep    On

    # Parser regex para logs del scraper en formato Java/logback:
    # 03:16:27.656 INFO  [a.e.s.MercadoLibreScraper] Iniciando: bicicleta rodado 29
    [PARSER]
        Name         scraper_regex
        Format       regex
        Regex        ^(?<time>\d{2}:\d{2}:\d{2}\.\d{3})\s+(?<level>INFO|WARN|ERROR|DEBUG|WARNING)\s+\[(?<logger>[^\]]+)\]\s+(?<message>.*)$
        Time_Key     time
        Time_Format  %H:%M:%S.%L
        Time_Keep    On

apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit
  namespace: elastic
data:
  product_extractor.lua: |
    function extract_all_fields(tag, timestamp, record)
        local msg = record["message"] or record["log"] or ""
        if msg == "" then
            return 0, 0, 0
        end

        -- level
        local level = string.match(msg, "%d+:%d+:%d+%.%d+%s+(%u+)%s+%[")
        if level then
            record["level"] = level
        end

        -- logger
        local logger = string.match(msg, "%[([^%]]+)%]")
        if logger then
            record["logger"] = logger
        end

        -- producto
        local producto = string.match(msg, "Iniciando:%s+(.+)$")
        if not producto then
            producto = string.match(msg, "JSON guardado:%s+/app/output/(.+)%.json$")
        end
        if not producto then
            producto = string.match(msg, "no aplicado en '([^']+)'")
        end
        if producto then
            record["producto"] = producto
        end

        -- event
        if string.find(msg, "Iniciando:") then
            record["event"] = "scrape_iniciado"
        elseif string.find(msg, "JSON guardado:") then
            record["event"] = "scrape_completado"
        end

        return 1, timestamp, record
    end
  custom_parsers.conf: |
    # Nota: el parser 'cri' ya viene built-in en Fluent Bit 3.x (parsers.conf).
    # Redefinirlo aquí causaba "already exists, skip" y Fluent Bit dejaba de
    # procesar el resto del archivo, dejando json_scraper sin cargar.
    [PARSER]
        Name         json_scraper
        Format       json
        Time_Key     timestamp
        Time_Format  %Y-%m-%dT%H:%M:%S%z
        Time_Keep    On

    # Parser regex para logs del scraper en formato Java/logback:
    # 03:16:27.656 INFO  [a.e.s.MercadoLibreScraper] Iniciando: bicicleta rodado 29
    [PARSER]
        Name         scraper_regex
        Format       regex
        Regex        ^(?<time>\d{2}:\d{2}:\d{2}\.\d{3})\s+(?<level>INFO|WARN|ERROR|DEBUG|WARNING)\s+\[(?<logger>[^\]]+)\]\s+(?<message>.*)$
        Time_Key     time
        Time_Format  %H:%M:%S.%L
        Time_Keep    On

  fluent-bit.conf: |
    [SERVICE]
        Daemon         Off
        Flush          5
        Log_Level      debug
        Parsers_File   /fluent-bit/etc/parsers.conf
        Parsers_File   /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*ml-scraper*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # Sólo nos quedamos con pods cuyo label app=scraper
    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['labels']['app'] ^scraper$

    # Parsea el JSON-line emitido por el scraper (si el log es JSON)
    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     log
        Parser       json_scraper
        Reserve_Data On
        Preserve_Key Off

    # Extrae level, logger, producto y event desde el mensaje usando Lua
    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/etc/conf/product_extractor.lua
        call    extract_all_fields

    [OUTPUT]
        Name              es
        Match             kube.*
        Host              scraper-es-http.elastic.svc.cluster.local
        Port              9200
        HTTP_User         elastic
        HTTP_Passwd       ${ES_PASSWORD}
        tls               On
        tls.verify        Off
        Suppress_Type_Name On
        Logstash_Format   On
        Logstash_Prefix   scraper-logs
        Logstash_DateFormat %Y.%m.%d
        Time_Key          @timestamp
        Replace_Dots      On
        Retry_Limit       5

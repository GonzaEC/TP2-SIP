apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: scraper
  namespace: elastic
spec:
  version: 8.17.3
  count: 1
  elasticsearchRef:
    name: scraper
  # xpack.actions.allowedActionTypes fue removido en Kibana 8.x.
  # Los connectors (.webhook, .index, etc.) están habilitados por defecto.
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 500m, memory: 1Gi }

apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: scraper
  namespace: elastic
spec:
  version: 8.17.3
  nodeSets:
    - name: default
      count: 1
      config:
        node.roles: ["master", "data", "ingest"]
        # Sin esta línea ES espera al menos 2 masters y queda en "yellow" para siempre.
        node.store.allow_mmap: false
        # Shards y réplicas se fijan en el index template (install.sh) — no aquí.
        # ES 8.x rechaza index-level settings en el config de nodo con IllegalArgumentException.
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              env:
                # Heap fijo: 1 GB (50% del limit de 2 GiB — regla de Elastic para JVM).
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
              resources:
                requests: { cpu: 500m,  memory: 1Gi }
                limits:   { cpu: 1000m, memory: 2Gi }
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi

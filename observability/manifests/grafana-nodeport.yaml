# Grafana Service NodePort — expuesto en el puerto 30000
# Nota: este Service ya está definido en grafana-values.yaml (service.type: NodePort).
# Este manifest existe como referencia/documentación. Si se aplica por fuera de Helm,
# asegura que el NodePort esté configurado correctamente.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
  selector:
    app.kubernetes.io/name: grafana

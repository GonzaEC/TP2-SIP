config:
  clients:
    - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    extraScrapeConfigs: |
      - job_name: ml-scraper-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ml-scraper]
        relabel_configs:
          # Drop pods que no son del scraper (ej: postgres del Hit #8)
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: scraper
            action: keep
          # Map labels Kubernetes a labels Loki
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_job_name]
            target_label: job_name
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          # Path al log file en el host — corregido: dos reglas separadas
          - source_labels: [__meta_kubernetes_pod_uid]
            target_label: __tmp_pod_uid
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: __tmp_container_name
          - source_labels: [__tmp_pod_uid, __tmp_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }

# Tolera taints del control plane porque en k3s single-node es el único nodo
tolerations:
  - effect: NoSchedule
    operator: Exists
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: agent
  namespace: otel
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.110.0
  serviceAccount: otel-collector
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 300m, memory: 256Mi }

  # Tolera taints del control plane (k3s single-node)
  tolerations:
    - effect: NoSchedule
      operator: Exists

  # Mountamos /var/log y /var/lib/docker/containers para que filelog pueda leer
  volumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  volumes:
    - name: varlog
      hostPath: { path: /var/log }
    - name: varlibdockercontainers
      hostPath: { path: /var/lib/docker/containers }

  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/ml-scraper_*/*/*.log
        # Empieza al final del archivo en cada boot — evita re-leer histórico
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parsea el formato CRI logs (timestamp + stream + flag + log)
          - type: container
            id: container-parser

      # OTLP receiver para el Hit #5 (cuando el scraper exporte directo via SDK)
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      # Enriquece con metadata k8s (namespace, pod, container, labels)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Renombrar campos para que sean idiomáticos en cada backend
      attributes:
        actions:
          # Loki prefiere "service" como label primario
          - key: service
            from_attribute: app
            action: insert

    exporters:
      # En este Hit solo debug. Hit #3 agrega loki + elasticsearch.
      debug:
        verbosity: detailed
        sampling_initial: 5
        sampling_thereafter: 200

    service:
      pipelines:
        logs:
          receivers: [filelog, otlp]
          processors: [k8sattributes, attributes, batch]
          exporters: [debug]
      telemetry:
        logs:
          level: info

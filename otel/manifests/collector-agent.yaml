apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: agent
  namespace: otel
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.110.0
  serviceAccount: otel-collector
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 300m, memory: 256Mi }

  # Tolera taints del control plane (k3s single-node)
  tolerations:
    - effect: NoSchedule
      operator: Exists

  # === HIT 3: credencial de Elastic inyectada desde secret ===
  env:
    - name: ELASTIC_PASSWORD
      valueFrom:
        secretKeyRef:
          name: elastic-credentials
          key: password

  # Mountamos /var/log y /var/lib/docker/containers para que filelog pueda leer
  volumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  volumes:
    - name: varlog
      hostPath: { path: /var/log }
    - name: varlibdockercontainers
      hostPath: { path: /var/lib/docker/containers }

  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/ml-scraper_*/*/*.log
        # Empieza al final del archivo en cada boot — evita re-leer histórico
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parsea el formato CRI logs (timestamp + stream + flag + log)
          - type: container
            id: container-parser

      # OTLP receiver para el Hit #5 (cuando el scraper exporte directo via SDK)
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      # Enriquece con metadata k8s (namespace, pod, container, labels)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Renombrar campos para que sean idiomáticos en cada backend
      attributes:
        actions:
          # Loki prefiere "service" como label primario
          - key: service
            from_attribute: app
            action: insert

      # === HIT 3: inyectar log_id único por cada log record ===
      # El processor "attributes" no puede generar UUIDs, se usa OTTL via transform.
      transform:
        log_statements:
          - context: log
            statements:
              - 'set(attributes["log_id"], UUID()) where attributes["log_id"] == nil'

    exporters:
      # Verbosity reducida — el pipeline ya se validó en Hit #2
      debug:
        verbosity: basic

      # === HIT 3 — Backend #1: Loki via OTLP nativo ===
      # Loki ≥ 3.0 acepta OTLP en el endpoint /otlp.
      # Este exporter (otlphttp/loki) reemplaza al "loki" legacy, que está
      # deprecado en 0.110+ y tiene problemas de cardinality con labels dinámicos.
      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp

      # === HIT 3 — Backend #2: Elasticsearch ===
      # La password se toma del env var inyectado desde el secret elastic-credentials.
      elasticsearch:
        endpoints:
          - https://scraper-es-http.elastic.svc.cluster.local:9200
        user: elastic
        password: ${env:ELASTIC_PASSWORD}
        tls:
          insecure_skip_verify: true   # cert self-signed del ECK operator (scraper-es-http)
        logs_index: scraper-logs
        mapping:
          mode: ecs                    # campo "level" como keyword, no text

    service:
      pipelines:
        logs:
          receivers:  [filelog, otlp]
          processors: [k8sattributes, attributes, transform, batch]
          exporters:  [otlphttp/loki, elasticsearch]
      telemetry:
        logs:
          level: info

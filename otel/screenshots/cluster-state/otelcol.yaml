kind: OpenTelemetryCollector
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"opentelemetry.io/v1beta1","kind":"OpenTelemetryCollector","metadata":{"annotations":{},"name":"agent","namespace":"otel"},"spec":{"config":{"exporters":{"debug":{"verbosity":"basic"},"elasticsearch":{"endpoints":["https://scraper-es-http.elastic.svc.cluster.local:9200"],"logs_index":"scraper-logs","mapping":{"mode":"ecs"},"password":"${env:ELASTIC_PASSWORD}","tls":{"insecure_skip_verify":true},"user":"elastic"},"otlphttp/loki":{"endpoint":"http://loki.observability.svc.cluster.local:3100/otlp"}},"processors":{"attributes":{"actions":[{"action":"insert","from_attribute":"app","key":"service"}]},"batch":{"send_batch_size":1024,"timeout":"10s"},"k8sattributes":{"auth_type":"serviceAccount","extract":{"labels":[{"from":"pod","key":"app","tag_name":"app"},{"from":"pod","key":"app.kubernetes.io/component","tag_name":"component"}],"metadata":["k8s.namespace.name","k8s.pod.name","k8s.pod.uid","k8s.deployment.name","k8s.statefulset.name","k8s.daemonset.name","k8s.cronjob.name","k8s.job.name","k8s.node.name"]},"passthrough":false,"pod_association":[{"sources":[{"from":"resource_attribute","name":"k8s.pod.uid"}]},{"sources":[{"from":"connection"}]}]},"transform":{"log_statements":[{"context":"log","statements":["set(attributes[\"log_id\"], UUID()) where attributes[\"log_id\"] == nil"]}]}},"receivers":{"filelog":{"include":["/var/log/pods/ml-scraper_*/*/*.log"],"include_file_name":false,"include_file_path":true,"operators":[{"id":"container-parser","type":"container"}],"start_at":"end"},"otlp":{"protocols":{"grpc":{"endpoint":"0.0.0.0:4317"},"http":{"endpoint":"0.0.0.0:4318"}}}},"service":{"pipelines":{"logs":{"exporters":["otlphttp/loki","elasticsearch"],"processors":["k8sattributes","attributes","transform","batch"],"receivers":["filelog","otlp"]}},"telemetry":{"logs":{"level":"info"}}}},"env":[{"name":"ELASTIC_PASSWORD","valueFrom":{"secretKeyRef":{"key":"password","name":"elastic-credentials"}}}],"image":"otel/opentelemetry-collector-contrib:0.110.0","m
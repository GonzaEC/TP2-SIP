name: Scraper CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── Job 0: Gitleaks – detecta secrets antes de hacer cualquier otra cosa ───
  secrets-scan:
    name: Gitleaks – secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 1: Tests unitarios + cobertura (sin browser real) ──────────────────
  unit-tests:
    name: Unit Tests & Coverage (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: secrets-scan

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    env:
      BROWSER:      ${{ matrix.browser }}
      HEADLESS:     "true"
      INTEGRATION:  "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Build & Test con cobertura
        working-directory: HIT6
        run: mvn --batch-mode verify -Dbrowser=${{ matrix.browser }}

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.browser }}
          path: HIT6/target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results-${{ matrix.browser }}
          path: HIT6/target/surefire-reports/
          retention-days: 7

  # ── Job 2: Validar sintaxis de manifiestos Kubernetes ──────────────────────
  k8s-validate:
    name: k8s – validate manifests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validar manifiestos HIT7
        run: |
          kubeconform -strict -summary HIT7/k8s/

      - name: Validar manifiestos HIT8
        run: |
          kubeconform -strict -summary HIT8/k8s/

  # ── Job 3: Docker build + scraper headless en contenedor ───────────────────
  docker-scraper:
    name: Docker – build & run (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: unit-tests
    # El scraping contra Mercado Libre puede fallar por bloqueo anti-bot desde IPs de datacenter.
    # Marcamos el job como continue-on-error para que el CI no falle completo por esto.
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Docker
        working-directory: HIT6
        run: |
          docker build \
            --target runtime \
            -t ml-scraper:latest \
            .

      - name: Correr scraper headless – ${{ matrix.browser }}
        id: scraper_run
        working-directory: HIT6
        # Permitir que este paso falle sin romper el job (capturemos el exit code manualmente
        # para reportar el estado en el siguiente paso).
        shell: bash
        run: |
          mkdir -p output screenshots
          if docker run --rm \
            -e BROWSER=${{ matrix.browser }} \
            -e HEADLESS=true \
            -v "$(pwd)/output:/app/output" \
            -v "$(pwd)/screenshots:/app/screenshots" \
            ml-scraper:latest \
            --browser ${{ matrix.browser }}; then
            echo "scraper_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "scraper_status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Reportar estado del scraper
        run: |
          echo "::notice::Estado del scraper (${{ matrix.browser }}): ${{ steps.scraper_run.outputs.scraper_status }}"

      - name: Fix permisos (Docker corre como root)
        if: always()
        run: chmod -R a+r HIT6/output/ HIT6/screenshots/ 2>/dev/null || true

      - name: Upload JSONs generados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-json-docker-${{ matrix.browser }}
          path: HIT6/output/
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-docker-${{ matrix.browser }}
          path: HIT6/screenshots/
          retention-days: 7

  # ── Job 4: Tests unitarios HIT8 + cobertura ───────────────────────────────
  unit-tests-hit8:
    name: HIT8 Unit Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: secrets-scan

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    env:
      BROWSER:      ${{ matrix.browser }}
      HEADLESS:     "true"
      INTEGRATION:  "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Build & Test HIT8 con cobertura
        working-directory: HIT8
        run: mvn --batch-mode verify -Dbrowser=${{ matrix.browser }}

      - name: Upload JaCoCo HTML report HIT8
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-hit8-${{ matrix.browser }}
          path: HIT8/target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire XML results HIT8
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results-hit8-${{ matrix.browser }}
          path: HIT8/target/surefire-reports/
          retention-days: 7

  # ── Job 5: Publicar imagen HIT6 en ghcr.io (solo en push a main) ──────────
  publish-image:
    name: Publish image to ghcr.io
    runs-on: ubuntu-latest
    needs: [unit-tests, k8s-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalizar owner a minúsculas
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push HIT6
        uses: docker/build-push-action@v6
        with:
          context: HIT6
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/ml-scraper:latest
            ghcr.io/${{ steps.owner.outputs.value }}/ml-scraper:${{ github.sha }}

  # ── Job 6: Publicar imagen HIT8 en ghcr.io (solo en push a main) ──────────
  publish-image-hit8:
    name: Publish HIT8 image to ghcr.io
    runs-on: ubuntu-latest
    needs: [unit-tests-hit8, k8s-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalizar owner a minúsculas
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push HIT8
        uses: docker/build-push-action@v6
        with:
          context: HIT8
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/ml-scraper-hit8:latest
            ghcr.io/${{ steps.owner.outputs.value }}/ml-scraper-hit8:${{ github.sha }}


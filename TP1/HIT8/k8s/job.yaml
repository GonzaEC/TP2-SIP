---
# job.yaml — HIT 5: versión one-shot para verificar que OTel funciona
# Igual que el CronJob pero name: scraper-sdk-test-1 para identificarlo en Loki.
apiVersion: batch/v1
kind: Job
metadata:
  name: scraper-sdk-test-1
  namespace: ml-scraper
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: scraper
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando PostgreSQL..."; sleep 3;
              done
              echo "PostgreSQL listo."
      containers:
        - name: scraper
          image: ml-scraper:otel-v1
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          envFrom:
            - configMapRef:
                name: scraper-config
            - configMapRef:
                name: otel-collector-endpoint
          volumeMounts:
            - name: output
              mountPath: /app/output
            - name: screenshots
              mountPath: /app/screenshots
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: scraper-output
        - name: screenshots
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
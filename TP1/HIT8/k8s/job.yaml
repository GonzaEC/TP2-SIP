---
# job.yaml
# Ejecuta el scraper una sola vez. Conecta a PostgreSQL via ConfigMap + Secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: scraper-once
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando PostgreSQL..."; sleep 3;
              done
              echo "PostgreSQL listo."
      containers:
        - name: scraper
          image: ghcr.io/gonzaec/ml-scraper-hit8:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: scraper-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: output
              mountPath: /app/output
            - name: screenshots
              mountPath: /app/screenshots
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: scraper-output
        - name: screenshots
          emptyDir: {}

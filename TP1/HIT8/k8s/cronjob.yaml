---
# cronjob.yaml
# Ejecuta el scraper cada hora. Conecta a PostgreSQL acumulando histórico.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scraper-hourly
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nc -z postgres 5432; do
                    echo "Esperando PostgreSQL..."; sleep 3;
                  done
                  echo "PostgreSQL listo."
          containers:
            - name: scraper
              image: ghcr.io/gonzaec/ml-scraper-hit8:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: scraper-config
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: output
                  mountPath: /app/output
                - name: screenshots
                  mountPath: /app/screenshots
          volumes:
            - name: output
              persistentVolumeClaim:
                claimName: scraper-output
            - name: screenshots
              emptyDir: {}
